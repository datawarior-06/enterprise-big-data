name: Build & Integration Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  integration-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17 for PySpark
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Integration Checks (Medallion & Tech Requirements)
        run: |
          python tests/integration/integration_check.py

      - name: Publish Integration Check Logs
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: tests/integration/integration.log
          retention-days: 7

      - name: Build Docker Image
        run: |
          docker build -t cbdt-insight-api:${{ github.sha }} -f docker/Dockerfile.api .
