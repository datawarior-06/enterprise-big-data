apiVersion: v1
kind: Service
metadata:
  name: api-service
  labels:
    app: cbdt-insight-api
spec:
  type: NodePort
  selector:
    app: cbdt-insight-api
  ports:
    - protocol: TCP
      port: 8080 # the port exposed on cluster
      targetPort: 8000 # the container's port
      nodePort: 30080 # exposed statically on local node
